<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Ecommerce Practica</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .product-card { border: 1px solid #ccc; padding: 10px; margin: 10px 0; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Mi Ecommerce Practica</h1>

<!-- Formulario para agregar productos -->
<div style="margin-bottom: 30px; border: 1px solid #eee; padding: 15px;">
    <h3>Agregar Nuevo Producto</h3>
    <input type="text" id="name" placeholder="Nombre del producto">
    <input type="number" id="price" placeholder="Precio">
    <button onclick="addProduct()">Guardar Producto</button>
</div>

<div id="product-list">Cargando productos...</div>

<script>
    const API_URL = 'http://localhost:5049/api/products'; // <--- ASEGÚRATE QUE EL PUERTO SEA EL TUYO

    async function loadProducts() {
        const response = await fetch(API_URL);
        const products = await response.json();
        const listDiv = document.getElementById('product-list');
        listDiv.innerHTML = products.map(p => `
            <div class="product-card">
                <h3>${p.name} - $${p.price}</h3>
                <button onclick="deleteProduct(${p.id})">Eliminar</button>
            </div>
        `).join('');
    }

    async function addProduct() {
        const name = document.getElementById('name').value;
        const price = document.getElementById('price').value;

        await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name, price: parseFloat(price) })
        });

        // Limpiar campos y recargar lista
        document.getElementById('name').value = '';
        document.getElementById('price').value = '';
        loadProducts();
    }


    async function deleteProduct(id) {
        if (confirm('¿Seguro que quieres eliminarlo?')) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            loadProducts(); // Recargar la lista
        }
    }


    loadProducts();
</script>
</body>
</html>
