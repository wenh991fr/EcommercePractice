<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Ecommerce Pro</title>
    <!-- CSS de Bootstrap -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .product-card { transition: transform 0.2s; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .product-card:hover { transform: translateY(-5px); }
    </style>
</head>



<body>

 <!-- Barra de Navegación (UI) -->
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">🚀 Mi Tienda Práctica</a>
        </div>
    </nav>

    <div class="container">
        <!-- Formulario con mejor UX (agrupado y limpio) -->
        <div class="card p-4 mb-5 shadow-sm">
            <h4 class="mb-3">Nuevo Producto</h4>
            <div class="row g-3">
                <div class="col-md-6">
                    <input type="text" id="name" class="form-control" placeholder="Nombre del producto">
                </div>
                <div class="col-md-4">
                    <input type="number" id="price" class="form-control" placeholder="Precio ($)">
                </div>
                <div class="col-md-2">
                    <button onclick="addProduct()" class="btn btn-primary w-100">Añadir</button>
                </div>
            </div>
        </div>

        <!-- Lista de Productos en Grid (Rejilla) -->
        <h2 class="mb-4">Catálogo de Productos</h2>
        <div id="product-list" class="row row-cols-1 row-cols-md-3 g-4">
            <!-- Los productos se cargarán aquí -->
        </div>
    </div>

<script>
    const API_URL = 'http://localhost:5049/api/products'; // <--- ASEGÚRATE QUE EL PUERTO SEA EL TUYO

    async function loadProducts() {
            const response = await fetch(API_URL);
            const products = await response.json();
            const listDiv = document.getElementById('product-list');
            
            listDiv.innerHTML = products.map(p => `
                <div class="col">
                    <div class="card h-100 product-card">
                        <img src="https://picsum.photos/id/${p.id}/200/300" class="card-img-top" alt="Producto">
                        <div class="card-body">
                            <h5 class="card-title">${p.name}</h5>
                            <p class="card-text text-success fw-bold">$${p.price}</p>
                        </div>
                        <div class="card-footer bg-transparent border-0 pb-3">
                            <button onclick="deleteProduct(${p.id})" class="btn btn-outline-danger btn-sm w-100">Eliminar</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

    async function addProduct() {
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value;
            if(!name || !price) return alert("Llena los campos");

            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, price: parseFloat(price) })
            });

            document.getElementById('name').value = '';
            document.getElementById('price').value = '';
            loadProducts();
        }


    async function deleteProduct(id) {
        if (confirm('¿Seguro que quieres eliminarlo?')) {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            loadProducts(); // Recargar la lista
        }
    }



    loadProducts();
</script>
</body>


</html>
